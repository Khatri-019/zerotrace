collector:
  address: "localhost:4317"
  tls: false
probes:
  tcp: true
  ssl: true
  http_parse: true
  process: true
filters:
  exclude_comms:
    - "agent"
    - "sshd"
    - "systemd"
    - "kworker"
  exclude_ports:
    - 22
    - 53
ring_buffer:
  size_mb: 256
export:
  batch_size: 100
  flush_interval_ms: 100
